name: Eval Prompts

# Runs the Flint eval harness whenever a prompt file is touched.
# Enforces the regression gate from .cursor/rules/flint-performance.mdc:
#   - directional conciseness pass rate >= 95%
#   - no per-domain relevance score below 0.7
#   - win rate >= 50% vs the stored baseline
#
# Ollama is provisioned in-runner with a small open model; the same model
# powers both the candidate response and the LLM judge. This keeps the
# pipeline free and reproducible without third-party API keys.

on:
  pull_request:
    paths:
      - "prompts/**"
      - "evals/**"
      - ".github/workflows/eval-prompts.yml"
  workflow_dispatch:

concurrency:
  group: eval-prompts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals-unit:
    name: eval crate unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          ./scripts/install-linux-deps.sh
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: cargo test (eval crate)
        run: cargo test --manifest-path evals/Cargo.toml --lib

  evals-gate:
    name: prompt regression gate
    runs-on: ubuntu-latest
    needs: evals-unit
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          ./scripts/install-linux-deps.sh
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          # Wait for Ollama to accept connections.
          for i in {1..30}; do
            if curl -sf http://localhost:11434/ > /dev/null; then
              echo "Ollama ready"
              break
            fi
            sleep 1
          done

      - name: Pull eval model
        run: ollama pull llama3.2:3b

      - name: Build eval crate
        run: cargo build --manifest-path evals/Cargo.toml --release

      - name: Run smoke eval (10 questions across all variants)
        run: |
          ./evals/target/release/evals \
            --questions-dir evals/questions \
            --prompts-dir prompts \
            --results-dir evals/results \
            --limit 10
        env:
          RUST_LOG: info

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/results/
          retention-days: 30
