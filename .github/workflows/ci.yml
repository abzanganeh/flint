name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint jobs: OS-independent, run only on Linux for speed ───────────────
  cargo-fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

  cargo-clippy:
    name: cargo clippy -- -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        run: |
          ./scripts/install-linux-deps.sh
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy --all-targets
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  # ─── Phase 7.4 cross-platform matrix ──────────────────────────────────────
  cargo-test:
    name: cargo test (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            install: linux
          - label: windows-x86_64
            runner: windows-latest
            install: windows
          - label: macos-arm64
            runner: macos-14
            install: macos
    steps:
      - uses: actions/checkout@v4

      - name: Install platform deps (Linux)
        if: matrix.install == 'linux'
        run: |
          ./scripts/install-linux-deps.sh
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> "$GITHUB_ENV"

      - name: Install platform deps (macOS)
        if: matrix.install == 'macos'
        run: ./scripts/install-macos-deps.sh

      - name: Install platform deps (Windows)
        if: matrix.install == 'windows'
        shell: pwsh
        run: ./scripts/install-windows-deps.ps1

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            evals/target
          key: cargo-${{ matrix.label }}-${{ hashFiles('src-tauri/Cargo.lock', 'evals/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.label }}-

      # Build everything first so a missing platform-specific symbol shows up
      # as a build failure (per OS) rather than a test failure deep in cargo's
      # test runner.
      - name: cargo build --all-targets
        working-directory: src-tauri
        run: cargo build --all-targets --locked

      # ort copy-dylibs skips deps/ when symlinks fail on Windows CI; stage
      # DirectML + ONNX Runtime DLLs next to test executables before running.
      - name: Stage runtime DLLs for tests (Windows)
        if: matrix.install == 'windows'
        shell: pwsh
        run: ./scripts/windows-prepare-tests.ps1

      - name: cargo test --lib
        working-directory: src-tauri
        run: cargo test --lib --locked

      - name: cargo test --bin bench_gate
        working-directory: src-tauri
        run: cargo test --bin bench_gate --locked

      # Integration tests touch SQLite, mock Tauri runtime, and the audio
      # pipeline (compile-only on Win/Mac per audio_pipeline.rs §A/B). They
      # work on all three platforms because the real device sections are
      # `#[ignore]`d.
      - name: cargo test --tests
        working-directory: src-tauri
        run: cargo test --tests --locked

      # The evals crate is Linux-gated in CI (eval-prompts.yml). Here we only
      # confirm it still compiles on every platform so contributors on Win/Mac
      # can iterate locally.
      - name: cargo build (evals)
        working-directory: evals
        run: cargo build --locked

  vitest:
    name: npx vitest run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx vitest run
